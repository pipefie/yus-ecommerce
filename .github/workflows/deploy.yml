name: Deploy to Hetzner

# Triggers: every push to master, or manually from GitHub UI
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "manual trigger"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Type-check before deploying broken code ───────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      # ── 2. Deploy to Hetzner via SSH ─────────────────────────────────────────
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd /opt/yus

            echo "→ Pulling latest code..."
            git pull origin master

            echo "→ Building new image..."
            docker compose -f docker-compose.prod.yml build web

            echo "→ Restarting app (zero-downtime swap)..."
            docker compose -f docker-compose.prod.yml up -d --no-deps web

            echo "→ Removing unused images..."
            docker image prune -f

            echo "✓ Deploy complete."

      # ── 3. Notify result ─────────────────────────────────────────────────────
      - name: Report success
        if: success()
        run: echo "Deploy succeeded for commit ${{ github.sha }}"

      - name: Report failure
        if: failure()
        run: echo "Deploy FAILED for commit ${{ github.sha }} — check logs above"
